spring.application.name=project
spring.config.import=optional:file:.env[.properties]
#config datasource
spring.datasource.url=jdbc:mysql://localhost:3306/project?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#config jpa
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#config jwt
jwt.secret=${JWT_SECRET}
jwt.expiration=300000
jwt.refresh_expiration=604800000
#config upload image
multipart.max-file-size=10MB
multipart.max-request-size=50MB
imageUploadDir=C:/Users/ADMIN/Desktop/project/src/main/resources/static/images/
#config redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=300000
#config cloudinary
spring.servlet.multipart.enabled=true
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}
#config send email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MY_EMAIL}
spring.mail.password=${MY_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
#config log
logging.level.root=off
logging.level.com.example.project=info
logging.file.name=logs/project.log
logging.file.path=logs
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
