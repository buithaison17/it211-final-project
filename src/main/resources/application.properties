spring.application.name=project
#config datasource
spring.datasource.url=jdbc:mysql://localhost:3306/project?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#config jpa
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#config jwt
jwt.secret=ThisIsASecretKeyForJWTThisIsASecretKeyForJWTThisIsASecretKeyForJWT
jwt.expiration=3600000
jwt.refresh_expiration=2592000000
#config upload image
multipart.max-file-size=10MB
multipart.max-request-size=50MB
imageUploadDir=C:/Users/ADMIN/Desktop/project/src/main/resources/static/images/
#config redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=300000